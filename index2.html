<!DOCTYPE html>
<html>
<head>
  <title>School System</title>
</head>
<body>

<h2>➕ Add Marks</h2>

<select id="studentSelect"></select><br><br>

<input id="subject" placeholder="Subject">
<input id="marks" placeholder="Marks">
<input id="total" placeholder="Total">

<button onclick="addMarks()">Save Marks</button>

<hr>

<h2>📊 Result</h2>
<input id="checkStudent" placeholder="Select Student ID">
<button onclick="getResult()">Show Result</button>

<p id="output"></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  // 👉 paste your config here
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let studentsMap = {};

// 🔥 Load students into dropdown
function loadStudents() {
  db.collection("students").get().then(snapshot => {
    let select = document.getElementById("studentSelect");

    snapshot.forEach(doc => {
      let data = doc.data();

      studentsMap[doc.id] = data.name;

      let option = document.createElement("option");
      option.value = doc.id;
      option.text = data.name;

      select.appendChild(option);
    });
  });
}

// 🔥 Add Marks
function addMarks() {
  let studentId = document.getElementById("studentSelect").value;
  let subject = document.getElementById("subject").value;
  let marks = Number(document.getElementById("marks").value);
  let total = Number(document.getElementById("total").value);

  db.collection("marks").add({
    studentId,
    subject,
    marks,
    total
  }).then(() => {
    alert("Marks Saved!");
  });
}

// 🔥 Get Result
function getResult() {
  let id = document.getElementById("checkStudent").value;

  db.collection("marks")
    .where("studentId", "==", id)
    .get()
    .then(snapshot => {

      let totalMarks = 0;
      let totalFull = 0;

      snapshot.forEach(doc => {
        let data = doc.data();
        totalMarks += data.marks;
        totalFull += data.total;
      });

      let percent = (totalMarks / totalFull) * 100;

      let status = "";
      let suggestion = "";

      if (percent < 50) {
        status = "⚠️ Weak";
        suggestion = "Basic practice needed (Math/English revision)";
      } else {
        status = "✅ Good";
        suggestion = "Keep it up!";
      }

      document.getElementById("output").innerHTML =
        "Student: " + studentsMap[id] + "<br>" +
        "Percentage: " + percent.toFixed(2) + "%<br>" +
        "Status: " + status + "<br>" +
        "Suggestion: " + suggestion;
    });
}

// Load students on page open
loadStudents();

</script>

</body>
</html>
