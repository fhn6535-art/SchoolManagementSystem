<!DOCTYPE html>
<html>
<head>
  <title>FH New Admin Panel</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #2c3e50;
    }

    input, select, button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #dcdfe6;
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.12);
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    button:hover {
      background: #2980b9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #eef1f4;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #f8fafc;
      font-weight: 700;
    }

    tr:hover {
      background: #f9fbfd;
    }

    .card {
      background: white;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      flex: 1;
      min-width: 220px;
    }

    /* LOGIN */
    #loginBox {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #eef4ff, #f7f9fc);
      z-index: 999;
    }

    #loginBox .loginCard {
      width: 360px;
      background: white;
      padding: 32px 28px;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.10);
      text-align: center;
    }

    #loginBox h2 {
      margin-top: 0;
      margin-bottom: 22px;
      color: #2c3e50;
    }

    #loginBox .loginCard input {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
    }

    #loginBox .loginCard button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
    }

    /* APP */
    #app {
      min-height: 100vh;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #243447, #1b2838);
      color: white;
      padding: 22px 16px;
      box-shadow: 2px 0 12px rgba(0,0,0,0.08);
    }

    .sidebar h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .sidebar hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 14px 0 20px;
    }

    .sidebar p {
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .sidebar p:hover {
      background: rgba(255,255,255,0.10);
    }

    .main {
      flex: 1;
      padding: 24px;
      overflow: auto;
    }

    #welcomeText {
      margin-top: 0;
      margin-bottom: 22px;
      font-size: 28px;
    }

    .statsRow {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .formRow,
    .filterRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .formRow input,
    .formRow select,
    .formRow button,
    .filterRow input {
      margin: 0;
    }

    .tableWrap {
      overflow-x: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      overflow: hidden;
      margin-top: 10px;
    }

    .actionBtn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin: 2px;
    }

    .deleteBtn {
      background: #e74c3c;
    }

    .deleteBtn:hover {
      background: #c0392b;
    }

    .editBtn {
      background: #27ae60;
    }

    .editBtn:hover {
      background: #1f8a4d;
    }

    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main {
        padding: 16px;
      }

      #welcomeText {
        font-size: 22px;
      }

      .statsRow {
        flex-direction: column;
      }

      .card {
        min-width: 100%;
      }

      .formRow input,
      .formRow select,
      .formRow button,
      .filterRow input {
        width: 100%;
      }

      #loginBox .loginCard {
        width: 92%;
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginBox">
    <div class="loginCard">
      <h2 id="userTitle">🔐 Login</h2>
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="app" style="display:none;">
    <div class="layout">

      <!-- SIDEBAR -->
      <div class="sidebar">
        <h2>🎓 FH Admin</h2>
        <hr>

        <p onclick="showPage('dashboard')">📊 Dashboard</p>
        <p onclick="showPage('students')">👨‍🎓 Students</p>
        <p onclick="logout()">🚪 Logout</p>
      </div>

      <!-- MAIN -->
      <div class="main">
        <h2 id="welcomeText">Welcome</h2>

        <!-- DASHBOARD -->
        <div id="dashboardPage">
          <div class="statsRow">
            <div class="card">Total Students: <b id="total">0</b></div>
            <div class="card">Avg Marks: <b id="avg">0</b></div>
          </div>
        </div>

        <!-- STUDENTS -->
        <div id="studentsPage" style="display:none;">

          <div class="formRow">
            <input id="name" placeholder="Name">
            <input id="class" placeholder="Class">
            <input id="section" placeholder="Section">
            <input id="roll" placeholder="Roll">
            <input id="marks" type="number" placeholder="Marks">

            <select id="attendance">
              <option>Present</option>
              <option>Absent</option>
              <option>Late</option>
            </select>

            <button onclick="addStudents()">Add</button>
          </div>

          <div class="filterRow">
            <input id="search" placeholder="Search..." onkeyup="applyFilters()">
            <input id="filterClass" placeholder="Class filter" onkeyup="applyFilters()">
            <input id="filterSection" placeholder="Section filter" onkeyup="applyFilters()">
          </div>

          <div style="margin: 10px 0 15px 0;">
           <button onclick="downloadCSV()">⬇ Download CSV</button>
        </div>

          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Class</th>
                  <th>Section</th>
                  <th>Roll</th>
                  <th>Marks</th>
                  <th>Attendance</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="table"></tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      deleteDoc,
      doc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOL08Us-2m5w7rznnwUGudTz-QOxyi1l4",
      authDomain: "school-management-system-93aba.firebaseapp.com",
      projectId: "school-management-system-93aba"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const db = getFirestore(appFirebase);
    const auth = getAuth(appFirebase);

    let allData = [];

    const loginBox = document.getElementById("loginBox");
    const app = document.getElementById("app");

    // LOGIN
    window.login = async function () {
      try {
        await signInWithEmailAndPassword(auth, email.value, password.value);
      } catch (e) {
        alert(e.message);
      }
    };

    // LOGOUT
    window.logout = () => signOut(auth);

    // SESSION
    onAuthStateChanged(auth, (user) => {
      if (user) {
        const name = user.email.split("@")[0];

        document.getElementById("welcomeText").innerText = "Welcome, " + name + " 👋";

        loginBox.style.display = "none";
        app.style.display = "block";

        showPage("dashboard");
      } else {
        loginBox.style.display = "flex";
        app.style.display = "none";
      }
    });

    // PAGE SWITCH
    window.showPage = function (page) {
      document.getElementById("dashboardPage").style.display = "none";
      document.getElementById("studentsPage").style.display = "none";

      if (page === "dashboard") {
        document.getElementById("dashboardPage").style.display = "block";
      }

      if (page === "students") {
        document.getElementById("studentsPage").style.display = "block";
      }
    };

    // ADD STUDENT
    window.addStudents = async function () {
      const name = document.getElementById("name").value;
      const cls = document.getElementById("class").value;
      const section = document.getElementById("section").value;
      const roll = document.getElementById("roll").value;
      const marks = document.getElementById("marks").value;
      const attendance = document.getElementById("attendance").value;

      if (!name || !cls || !section || !roll) {
        alert("Fill all fields");
        return;
      }

      await addDoc(collection(db, "students"), {
        name,
        className: cls,
        section,
        roll,
        marks,
        attendance
      });

      document.getElementById("name").value = "";
      document.getElementById("class").value = "";
      document.getElementById("section").value = "";
      document.getElementById("roll").value = "";
      document.getElementById("marks").value = "";
      document.getElementById("attendance").value = "Present";
    };

    // LOAD DATA
    onSnapshot(collection(db, "students"), (snap) => {
      allData = [];
      snap.forEach(d => allData.push({ id: d.id, ...d.data() }));
      applyFilters();
    });

    // FILTER
    window.applyFilters = function () {
      const s = document.getElementById("search").value.toLowerCase();
      const c = document.getElementById("filterClass").value.toLowerCase();
      const sec = document.getElementById("filterSection").value.toLowerCase();

      const filtered = allData.filter(d =>
        (d.name || "").toLowerCase().includes(s) &&
        (c ? (d.className || "").toLowerCase().includes(c) : true) &&
        (sec ? (d.section || "").toLowerCase().includes(sec) : true)
      );

      render(filtered);
    };

    // RENDER
    function render(data) {
      const table = document.getElementById("table");
      const total = document.getElementById("total");
      const avg = document.getElementById("avg");

      table.innerHTML = "";

      let sum = 0;

      data.forEach(d => {
        sum += Number(d.marks || 0);

        table.innerHTML += `
          <tr>
            <td>${d.name || ""}</td>
            <td>${d.className || ""}</td>
            <td>${d.section || ""}</td>
            <td>${d.roll || ""}</td>
            <td>${d.marks || ""}</td>
            <td>${d.attendance || ""}</td>
            <td>
              <button class="actionBtn deleteBtn" onclick="del('${d.id}')">Delete</button>
              <button class="actionBtn editBtn" onclick="edit('${d.id}','${d.name || ""}','${d.marks || ""}')">Edit</button>
            </td>
          </tr>
        `;
      });

      total.innerText = data.length;
      avg.innerText = data.length ? (sum / data.length).toFixed(2) : 0;
    }

    // DELETE
    window.del = (id) => deleteDoc(doc(db, "students", id));

    // EDIT
    window.edit = async (id, name, marks) => {
      const n = prompt("Name", name);
      const m = prompt("Marks", marks);

      if (n === null || m === null) return;

      await updateDoc(doc(db, "students", id), {
        name: n,
        marks: m
      });
    };

   window.downloadCSV = function () {
  const s = document.getElementById("search").value.toLowerCase();
  const c = document.getElementById("filterClass").value.toLowerCase();
  const sec = document.getElementById("filterSection").value.toLowerCase();

  const filtered = allData.filter(d =>
    (d.name || "").toLowerCase().includes(s) &&
    (c ? (d.className || "").toLowerCase().includes(c) : true) &&
    (sec ? (d.section || "").toLowerCase().includes(sec) : true)
  );

  if (!filtered.length) {
    alert("No filtered data found");
    return;
  }

  let csv = "Name,Class,Section,Roll,Marks,Attendance\n";

  filtered.forEach(student => {
    const row = [
      `"${student.name || ""}"`,
      `"${student.className || ""}"`,
      `"${student.section || ""}"`,
      `"${student.roll || ""}"`,
      `"${student.marks || ""}"`,
      `"${student.attendance || ""}"`
    ];

    csv += row.join(",") + "\n";
  });

  const blob = new Blob([csv], {
    type: "text/csv;charset=utf-8;"
  });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "filtered_students.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
};

  </script>

</body>
</html>
