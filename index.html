<!DOCTYPE html>
<html>
<head>
  <title>FH School Management System</title>
  <style>
   body { 
  font-family: Arial; 
  padding: 20px; 
}

input, select, button { 
  margin: 5px; 
  padding: 8px; 
}

table { 
  border-collapse: collapse; 
  width: 100%; 
  min-width: 900px; /* 🔥 important */
  margin-top: 15px; 
}

th, td { 
  border: 1px solid #ccc; 
  padding: 8px; 
  text-align: center; 
}

th {
  background: #f5f5f5;
}
  </style>
</head>
<body>

<h2 id="userTitle">🔐 Login</h2>

<div id="loginBox">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
<h2>🔥 FH School Management System</h2>

<!-- Dashboard -->
<div>
  <b>Total:</b> <span id="total">0</span> |
  <b>Avg Marks:</b> <span id="avg">0</span> | <button onclick="logout()">Logout</button><br><br>
</div>

<br>

<!-- Form -->
<input id="name" placeholder="Name">
<input id="class" placeholder="Class">
<input id="section" placeholder="Section">
<input id="roll" placeholder="Roll">
<input id="marks" type="number" placeholder="Marks">

<select id="attendance">
  <option>Present</option>
  <option>Absent</option>
  <option>Late</option>
</select>

<button onclick="addStudents()">Add</button> 

<br>

<!-- Search -->
<input id="filterClass" placeholder="Filter by Class" onkeyup="applyFilters()">
<input id="filterSection" placeholder="Filter by Section" onkeyup="applyFilters()">
<input id="search" placeholder="Search by name..." onkeyup="applyFilters()">
    
<!-- Export -->
<button onclick="exportCSV()">CSV</button>
<button onclick="exportPDF()">PDF</button>

<!-- Table -->
<div style="overflow-x:auto;">
  <table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Class</th>
      <th>Section</th>
      <th>Roll</th>
      <th>Marks</th>
      <th>Attendance</th>
     <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>
</div>
  
<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  
const firebaseConfig = {
  apiKey: "AIzaSyCOL08Us-2m5w7rznnwUGudTz-QOxyi1l4",
  authDomain: "school-management-system-93aba.firebaseapp.com",
  projectId: "school-management-system-93aba"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
  
let allData = [];

// LOGIN
window.login = async function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    alert("Login failed");
  }
};

// LOGOUT
window.logout = function() {
  signOut(auth);
};

// SESSION CHECK
onAuthStateChanged(auth, async (user) => {
  if (user) {

    const ref = doc(db, "users", user.email);
    const snap = await getDoc(ref);

    currentRole = snap.exists() ? snap.data().role : "teacher";

    // 🔥 name show
    const name = snap.exists() ? snap.data().name : user.email;
document.getElementById("userTitle").innerText = "Welcome, " + name + " 👋";

    loginBox.style.display = "none";
    app.style.display = "block";

  } else {
    document.getElementById("userTitle").innerText = "🔐 Login";

    loginBox.style.display = "block";
    app.style.display = "none";
  }
});

// ADD Student Function
window.addStudents = async function() {
  try {
    // HTML-এর id অনুযায়ী সিলেক্ট করা হয়েছে
    const nameInput = document.getElementById('name');
    const classInput = document.getElementById('class');
    const sectionInput = document.getElementById('section');
    const rollInput = document.getElementById('roll');
    const marksInput = document.getElementById('marks');
    const attendanceInput = document.getElementById('attendance');

    // ভ্যালু সংগ্রহ
    const name = nameInput.value;
    const cls = classInput.value;
    const section = sectionInput.value;
    const roll = rollInput.value;
    const marks = marksInput.value;
    const attendance = attendanceInput.value;
      
    if (!name || !cls || !section|| !roll) {
      alert("Please fill Name, Class, Section and Roll");
      return;
    }

    // ফায়ারবেসে ডেটা পাঠানো
 await addDoc(collection(db, "students"), {
  name: name.value,
  className: document.getElementById("class").value,
  section: section.value,
  roll: roll.value,
  marks: marks.value,
  attendance: attendance.value
});

    alert("Student added successfully!");

    // ফর্ম ক্লিয়ার করা
    nameInput.value = "";
    classInput.value = "";
    sectionInput.value = "";
    rollInput.value = "";
    marksInput.value = "";

  } catch (error) {
    console.error("Error: ", error);
    alert("Error: " + error.message);
  }
};


// AUTO LOAD
onSnapshot(collection(db, "students"), (snapshot) => {
  allData = [];
  snapshot.forEach(docSnap => {
    allData.push({ id: docSnap.id, ...docSnap.data() });
  });
  render(allData);
});

// RENDER
function render(data) {
  const table = document.getElementById("table");
  table.innerHTML = "";

  let total = data.length;
  let sum = 0;

  data.forEach(d => {
    sum += Number(d.marks || 0);

    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.className}</td>
        <td>${d.section}</td>
        <td>${d.roll}</td>
        <td>${d.marks}</td>
        <td>${d.attendance}</td>
        <td>
          <button onclick="del('${d.id}')">Delete</button>
          <button onclick="edit('${d.id}','${d.name}','${d.className}','${d.section}','${d.roll}','${d.marks}','${d.attendance}')">Edit</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("avg").innerText = total ? (sum / total).toFixed(2) : 0;
}

// DELETE
window.del = async function(id) {
  await deleteDoc(doc(db, "students", id));
};

// EDIT
window.edit = async function(id, name, cls, section, roll, marks, attendance) {
  const newName = prompt("Name", name);
  const newMarks = prompt("Marks", marks);

  await updateDoc(doc(db, "students", id), {
    name: newName,
    marks: newMarks
  });
};

// SEARCH
window.filterData = function() {
   const val = document.getElementById("search").value.toLowerCase();
  const filtered = allData.filter(d => d.name.toLowerCase().includes(val));
  render(filtered);
};

// CSV
window.exportCSV = function() {
  let csv = "Name,Class,Section,Roll,Marks,Attendance\n";
  allData.forEach(d => {
    csv += `${d.name},${d.className},${d.section},${d.roll},${d.marks},${d.attendance}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "students.csv";
  a.click();
};

// PDF
window.exportPDF = async function() {
  const { jsPDF } = await import("https://cdn.jsdelivr.net/npm/jspdf@2.5.1/+esm");
  const doc = new jsPDF();

  doc.text("Student Report", 10, 10);

  allData.forEach((d, i) => {
    doc.text(`${i+1}. ${d.name} | ${d.marks}`, 10, 20 + i*10);
  });

  doc.save("report.pdf");
};
window.applyFilters = function() {
  const search = document.getElementById("search").value.toLowerCase();
  const classFilter = document.getElementById("filterClass").value.toLowerCase();
  const sectionFilter = document.getElementById("filterSection").value.toLowerCase();

  const filtered = allData.filter(d => {
    return (
      (d.name.toLowerCase().includes(search)) &&
      (classFilter? d.className.toLowerCase().includes(classFilter) : true) &&
      (sectionFilter? d.section?.toLowerCase().includes(sectionFilter) : true)
    );
  });

  render(filtered);
};
  
</script>

</body>
</html>
